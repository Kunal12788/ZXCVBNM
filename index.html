<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Send Line — Manual Test Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap');

  :root {
    --bg: #12151a;
    --panel: #1a1e24;
    --panel-raised: #20252c;
    --border: #2c3138;
    --text: #e7e5df;
    --text-dim: #8b909a;
    --signal-idle: #4a5058;
    --signal-sent: #7d8590;
    --signal-delivered: #4fd1c5;
    --signal-read: #3ea8ff;
    --amber: #f2a65a;
    --rose: #e5626a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(79, 209, 197, 0.06), transparent),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px;
  }

  .console {
    width: 100%;
    max-width: 560px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .eyebrow::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }

  .sub {
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 32px;
    line-height: 1.5;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }

  label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field {
    margin-bottom: 18px;
  }

  .field-row {
    display: flex;
    gap: 12px;
  }
  .field-row .field {
    flex: 1;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 11px 12px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--signal-delivered);
  }

  textarea {
    min-height: 96px;
    resize: vertical;
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
  }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  button.send {
    width: 100%;
    background: var(--signal-delivered);
    color: #0a1210;
    border: none;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 13px;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.1s ease;
  }

  button.send:hover:not(:disabled) { filter: brightness(1.08); }
  button.send:active:not(:disabled) { transform: scale(0.99); }
  button.send:disabled {
    background: var(--signal-idle);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .log {
    margin-top: 28px;
  }

  .log-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .entry {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
    animation: rise 0.25s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ticks {
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
    width: 20px;
    padding-top: 1px;
  }

  .ticks svg { display: block; }

  .entry-body { flex: 1; min-width: 0; }
  .entry-contact { font-weight: 500; }
  .entry-message {
    color: var(--text-dim);
    margin-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .entry-error { color: var(--rose); margin-top: 4px; font-size: 12px; }
  .entry-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
    padding-top: 1px;
  }

  .empty {
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px 0;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="console">
    <div class="eyebrow">Queue System via Supabase</div>
    <h1>Send Line</h1>
    <p class="sub">Type a contact number and a message. This will be queued in your Supabase database and delivered by your local runner.</p>

    <div class="panel">
      <form id="sendForm">
        <div class="field">
          <label for="contact">Contact name</label>
          <input type="text" id="contact" placeholder="Exact name as saved in WhatsApp" autocomplete="off" required />
        </div>

        <div class="field">
          <label for="phone">Phone number <span style="text-transform:none; color: var(--text-dim);">(optional — only needed for duplicate names)</span></label>
          <input type="text" id="phone" placeholder="+91 98765 43210" autocomplete="off" />
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Type what you want to send..." required></textarea>
        </div>

        <button type="submit" class="send" id="sendBtn">Send message</button>
      </form>
    </div>

    <div class="log">
      <div class="log-title">Session log</div>
      <div id="logList">
        <div class="empty" id="emptyState">Nothing sent yet this session.</div>
      </div>
    </div>
  </div>

<script>
  const form = document.getElementById('sendForm');
  const sendBtn = document.getElementById('sendBtn');
  const logList = document.getElementById('logList');
  const emptyState = document.getElementById('emptyState');

  function tickIcon(status) {
    const color = {
      pending: 'var(--signal-idle)',
      sent: 'var(--signal-sent)',
      delivered: 'var(--signal-delivered)',
      read: 'var(--signal-read)',
      unconfirmed: 'var(--amber)',
      error: 'var(--rose)',
    }[status] || 'var(--signal-idle)';

    const double = ['sent', 'delivered', 'read', 'unconfirmed'].includes(status);

    if (status === 'error') {
      return `<svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" stroke="${color}" stroke-width="1.6" fill="none"/><path d="M8 5v4M8 11v.01" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/></svg>`;
    }
    if (status === 'pending') {
      return `<svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" stroke="${color}" stroke-width="1.6" fill="none" stroke-dasharray="3 3"/></svg>`;
    }
    if (double) {
      return `<svg width="18" height="14" viewBox="0 0 18 14"><path d="M1 7l3 3 6-7" stroke="${color}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 7l3 3 8-9" stroke="${color}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    return `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 7l3 3 8-9" stroke="${color}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function addEntry({ contact, message, status, error }) {
    emptyState.style.display = 'none';
    const entry = document.createElement('div');
    entry.className = 'entry';
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    entry.innerHTML = `
      <div class="ticks">${tickIcon(status)}</div>
      <div class="entry-body">
        <div class="entry-contact">${contact}</div>
        <div class="entry-message">${message}</div>
        ${error ? `<div class="entry-error">${error}</div>` : ''}
      </div>
      <div class="entry-time">${time}</div>
    `;
    logList.prepend(entry);
    return entry;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const contact = document.getElementById('contact').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const message = document.getElementById('message').value;

    if (!contact || !message.trim()) return;

    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending...';
    const entry = addEntry({ contact, message, status: 'pending' });

    try {
      const res = await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contact, message, phone: phone || undefined }),
      });
      const data = await res.json();

      if (data.ok) {
        entry.querySelector('.ticks').innerHTML = tickIcon(data.deliveryStatus);
        document.getElementById('message').value = '';
      } else {
        entry.querySelector('.ticks').innerHTML = tickIcon('error');
        entry.insertAdjacentHTML('beforeend', '');
        entry.querySelector('.entry-body').insertAdjacentHTML(
          'beforeend',
          `<div class="entry-error">${data.error}</div>`
        );
      }
    } catch (err) {
      entry.querySelector('.ticks').innerHTML = tickIcon('error');
      entry.querySelector('.entry-body').insertAdjacentHTML(
        'beforeend',
        `<div class="entry-error">Couldn't reach the server: ${err.message}</div>`
      );
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send message';
    }
  });
</script>
</body>
</html>
